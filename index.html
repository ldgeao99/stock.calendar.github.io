<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나만의 주식 이벤트 캘린더</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:1100px;
    margin:20px auto;
    padding:20px;
}

h1{
    text-align:center;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:5px;
}

.dayname,.day{
    border:1px solid #ddd;
    padding:8px;
}

.dayname{
    background:#f5f5f5;
    text-align:center;
    font-weight:bold;
}

.day{
    height:120px;
    cursor:pointer;
    overflow:auto;
}

.day:hover{
    background:#f0f8ff;
}

.date{
    font-weight:bold;
}

.event{
    font-size:12px;
    background:#e8f0fe;
    margin:3px 0;
    padding:3px;
    border-radius:4px;
}

.today{
    border:2px solid black;
}

#modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
}

.modal-content{
    background:white;
    max-width:500px;
    margin:5% auto;
    padding:20px;
}

input, textarea, button{
    width:100%;
    padding:8px;
    margin:5px 0;
    box-sizing:border-box;
}

button{
    cursor:pointer;
}
</style>
</head>

<body>

<h1>📈 나만의 주식 이벤트 캘린더</h1>

<div class="header">
    <button onclick="changeMonth(-1)">◀ 이전</button>
    <h2 id="monthTitle"></h2>
    <button onclick="changeMonth(1)">다음 ▶</button>
</div>

<div class="calendar" id="calendar"></div>

<div id="modal">
    <div class="modal-content">

        <h3>일정 등록</h3>

        <label>날짜</label>
        <input type="date" id="date">

        <label>이벤트명</label>
        <input type="text" id="eventName">

        <label>세부내용</label>
        <textarea id="detail" rows="5"></textarea>

        <label>관련주</label>
        <input
            type="text"
            id="relatedStocks"
            placeholder="삼성전자, SK하이닉스">

        <button onclick="saveEvent()">저장</button>
        <button onclick="closeModal()">닫기</button>

    </div>
</div>

<script>

// ==========================
// 여기에 Apps Script URL 입력
// ==========================
const API_URL =
"https://script.google.com/macros/s/AKfycbwFYE6R5An3Nr78OBUv6DqZHVdfEkYE6Hjd7sx45lVqt3naIr20DusIZNyy9pI2lCMVvg/exec";


let events = [];
let current = new Date();

async function loadEvents(){

    try{

        const response = await fetch(API_URL);

        events = await response.json();

        drawCalendar();

    }catch(error){

        console.error(error);

        alert("Google Apps Script URL을 확인해주세요.");

    }
}


function drawCalendar(){

    const cal = document.getElementById('calendar');

    cal.innerHTML = '';

    ['일','월','화','수','목','금','토'].forEach(day=>{

        cal.innerHTML +=
        `<div class='dayname'>${day}</div>`;

    });

    let year = current.getFullYear();
    let month = current.getMonth();

    document.getElementById('monthTitle').innerText =
    `${year}년 ${month+1}월`;

    let firstDay = new Date(year,month,1).getDay();

    let lastDate = new Date(year,month+1,0).getDate();

    for(let i=0;i<firstDay;i++){

        cal.innerHTML += "<div class='day'></div>";

    }

    for(let d=1; d<=lastDate; d++){

        let fullDate =
        `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

        let dayEvents = events.filter(e =>

            String(e.date).startsWith(fullDate)

        );

        let html =

        `<div class='day'
             onclick="openNew('${fullDate}')">

            <div class='date'>${d}</div>`;

        dayEvents.forEach(ev=>{

            html +=
            `<div class='event'>
                📌 ${ev.eventName}
            </div>`;

        });

        html += `</div>`;

        cal.innerHTML += html;
    }
}


function openNew(dateValue){

    document.getElementById('date').value =
    dateValue;

    document.getElementById('eventName').value = '';

    document.getElementById('detail').value = '';

    document.getElementById('relatedStocks').value = '';

    document.getElementById('modal').style.display =
    'block';
}


function closeModal(){

    document.getElementById('modal').style.display =
    'none';
}


async function saveEvent(){

    const payload = {

        date :
        document.getElementById('date').value,

        eventName :
        document.getElementById('eventName').value,

        detail :
        document.getElementById('detail').value,

        relatedStocks :
        document.getElementById('relatedStocks').value

    };

    try{

        await fetch(API_URL,{

            method:'POST',

            body:JSON.stringify(payload)

        });

        closeModal();

        await loadEvents();

        alert("저장 완료");

    }catch(error){

        console.error(error);

        alert("저장 실패");

    }
}


function changeMonth(value){

    current.setMonth(current.getMonth()+value);

    drawCalendar();

}


loadEvents();

</script>

</body>
</html>
